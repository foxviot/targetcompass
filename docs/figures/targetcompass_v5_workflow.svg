<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="980" viewBox="0 0 1440 980">
  <defs>
    <style>
      .bg { fill: #fbfcfe; }
      .title { font: 700 34px "Microsoft YaHei", "Segoe UI", sans-serif; fill: #132033; }
      .subtitle { font: 400 18px "Microsoft YaHei", "Segoe UI", sans-serif; fill: #64748b; }
      .box { fill: #ffffff; stroke: #d8e0ea; stroke-width: 1.5; }
      .agent { fill: #eefbf3; stroke: #8cccaa; stroke-width: 1.5; }
      .gate { fill: #fff7ed; stroke: #f0b76b; stroke-width: 1.5; }
      .run { fill: #eef2ff; stroke: #a8b6f0; stroke-width: 1.5; }
      .qc { fill: #fff1f2; stroke: #eca0ac; stroke-width: 1.5; }
      .report { fill: #f0fdfa; stroke: #7dd3c7; stroke-width: 1.5; }
      .h { font: 700 20px "Microsoft YaHei", "Segoe UI", sans-serif; fill: #1e293b; }
      .t { font: 400 15px "Microsoft YaHei", "Segoe UI", sans-serif; fill: #334155; }
      .small { font: 400 13px "Microsoft YaHei", "Segoe UI", sans-serif; fill: #64748b; }
      .num { font: 700 18px "Segoe UI", sans-serif; fill: #ffffff; }
      .dot { fill: #2563eb; }
      .arrow { stroke: #64748b; stroke-width: 2.3; fill: none; marker-end: url(#arrow); }
      .stop { stroke: #ef4444; stroke-width: 2.3; fill: none; marker-end: url(#arrowRed); }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#64748b" />
    </marker>
    <marker id="arrowRed" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#ef4444" />
    </marker>
  </defs>
  <rect class="bg" width="1440" height="980"/>
  <text x="70" y="70" class="title">TargetCompass v5 端到端研究流程</text>
  <text x="70" y="103" class="subtitle">核心原则：数据反向约束方法，QC 和人工审批约束结论，所有结果必须能追溯到 Evidence、Artifact、TaskRun 和 Handoff。</text>

  <g transform="translate(90,150)">
    <rect width="260" height="95" rx="16" class="box"/>
    <circle cx="34" cy="32" r="18" class="dot"/><text x="28" y="39" class="num">1</text>
    <text x="65" y="35" class="h">研究问题输入</text>
    <text x="65" y="63" class="t">用户提出疾病、组织、细胞、靶点方向</text>
  </g>

  <g transform="translate(430,150)">
    <rect width="260" height="95" rx="16" class="agent"/>
    <circle cx="34" cy="32" r="18" class="dot"/><text x="28" y="39" class="num">2</text>
    <text x="65" y="35" class="h">LLM 结构化理解</text>
    <text x="65" y="63" class="t">ResearchSpec、SubQuestion、ScopeBundle</text>
  </g>

  <g transform="translate(770,150)">
    <rect width="260" height="95" rx="16" class="agent"/>
    <circle cx="34" cy="32" r="18" class="dot"/><text x="28" y="39" class="num">3</text>
    <text x="65" y="35" class="h">EvidencePlan</text>
    <text x="65" y="63" class="t">证据轴、方法合同、claim ceiling</text>
  </g>

  <g transform="translate(1110,150)">
    <rect width="260" height="95" rx="16" class="agent"/>
    <circle cx="34" cy="32" r="18" class="dot"/><text x="28" y="39" class="num">4</text>
    <text x="65" y="35" class="h">真实资源发现</text>
    <text x="65" y="63" class="t">GEO/SRA/ArrayExpress/cellxgene/PubMed</text>
  </g>

  <g transform="translate(1110,330)">
    <rect width="260" height="115" rx="16" class="gate"/>
    <circle cx="34" cy="32" r="18" class="dot"/><text x="28" y="39" class="num">5</text>
    <text x="65" y="35" class="h">数据集锁库门控</text>
    <text x="65" y="63" class="t">metadata、分组、样本量、物种、组织</text>
    <text x="65" y="88" class="small">不足时进入人工纠错，不继续伪分析</text>
  </g>

  <g transform="translate(770,330)">
    <rect width="260" height="115" rx="16" class="run"/>
    <circle cx="34" cy="32" r="18" class="dot"/><text x="28" y="39" class="num">6</text>
    <text x="65" y="35" class="h">TaskPacket 编译</text>
    <text x="65" y="63" class="t">Analysis / Review / Engineering</text>
    <text x="65" y="88" class="small">按数据可用性决定方法路线</text>
  </g>

  <g transform="translate(430,330)">
    <rect width="260" height="115" rx="16" class="run"/>
    <circle cx="34" cy="32" r="18" class="dot"/><text x="28" y="39" class="num">7</text>
    <text x="65" y="35" class="h">执行层</text>
    <text x="65" y="63" class="t">local / Nextflow / Codex Worker</text>
    <text x="65" y="88" class="small">产生 TaskRun、Artifact、日志、失败原因</text>
  </g>

  <g transform="translate(90,330)">
    <rect width="260" height="115" rx="16" class="qc"/>
    <circle cx="34" cy="32" r="18" class="dot"/><text x="28" y="39" class="num">8</text>
    <text x="65" y="35" class="h">四层 QC</text>
    <text x="65" y="63" class="t">Execution / Data / Statistical / Biological</text>
    <text x="65" y="88" class="small">失败或证据不足进入复核或重跑</text>
  </g>

  <g transform="translate(90,545)">
    <rect width="260" height="115" rx="16" class="report"/>
    <circle cx="34" cy="32" r="18" class="dot"/><text x="28" y="39" class="num">9</text>
    <text x="65" y="35" class="h">Evidence 入库</text>
    <text x="65" y="63" class="t">EvidenceRepository + ArtifactStore</text>
    <text x="65" y="88" class="small">只允许已审核或需复核证据入链</text>
  </g>

  <g transform="translate(430,545)">
    <rect width="260" height="115" rx="16" class="qc"/>
    <circle cx="34" cy="32" r="18" class="dot"/><text x="24" y="39" class="num">10</text>
    <text x="65" y="35" class="h">问题对齐审计</text>
    <text x="65" y="63" class="t">检查是否回答原问题、是否超证据等级</text>
    <text x="65" y="88" class="small">抓 unsupported claim / scope drift</text>
  </g>

  <g transform="translate(770,545)">
    <rect width="260" height="115" rx="16" class="gate"/>
    <circle cx="34" cy="32" r="18" class="dot"/><text x="24" y="39" class="num">11</text>
    <text x="65" y="35" class="h">人工审批与签出</text>
    <text x="65" y="63" class="t">通过 / 复核 / 驳回 / 理由 / 版本</text>
    <text x="65" y="88" class="small">禁止生成者自我审批</text>
  </g>

  <g transform="translate(1110,545)">
    <rect width="260" height="115" rx="16" class="report"/>
    <circle cx="34" cy="32" r="18" class="dot"/><text x="24" y="39" class="num">12</text>
    <text x="65" y="35" class="h">正式报告</text>
    <text x="65" y="63" class="t">候选排序、证据链、失败项、限制</text>
    <text x="65" y="88" class="small">HTML / DOCX / manifest / export package</text>
  </g>

  <path d="M350 198 L430 198" class="arrow"/>
  <path d="M690 198 L770 198" class="arrow"/>
  <path d="M1030 198 L1110 198" class="arrow"/>
  <path d="M1240 245 L1240 330" class="arrow"/>
  <path d="M1110 388 L1030 388" class="arrow"/>
  <path d="M770 388 L690 388" class="arrow"/>
  <path d="M430 388 L350 388" class="arrow"/>
  <path d="M220 445 L220 545" class="arrow"/>
  <path d="M350 603 L430 603" class="arrow"/>
  <path d="M690 603 L770 603" class="arrow"/>
  <path d="M1030 603 L1110 603" class="arrow"/>

  <path d="M1240 445 C1240 500 1160 500 1160 475" class="stop"/>
  <text x="1185" y="500" class="small">metadata 不足：停止并人工纠错</text>
  <path d="M220 445 C220 500 150 500 150 475" class="stop"/>
  <text x="95" y="500" class="small">QC 失败：重跑或复核</text>
  <path d="M900 660 C900 760 560 825 220 660" class="arrow"/>
  <text x="515" y="810" class="small">审批驳回或证据不足时，返回任务包、资源发现或执行层局部重算</text>

  <rect x="90" y="760" width="1280" height="120" rx="18" class="box"/>
  <text x="125" y="805" class="h">可追溯输出</text>
  <text x="125" y="837" class="t">每个报告结论都应该能追到：原始问题 → Handoff → ResourceCandidate / DatasetProfile → TaskPacket → TaskRun → ArtifactManifest → QCReport → EvidenceItem → Claim → Signoff。</text>
  <text x="125" y="865" class="small">这也是 v5 与普通“多 Agent 串 prompt”方案的核心区别：不是只生成文字，而是把科学证据、失败原因和人工门控纳入工程状态机。</text>
</svg>
